@version: 4.6
@include "scl.conf"

source s_syslog {
  syslog(
    transport(udp)
    ip(0.0.0.0)
    port(1514)
  );
};

destination d_http {
  http(
    url("http://redis-writer:1814/ingest")
    method("POST")
    headers("Content-Type: application/json")
    body("$(format-json --scope all-nv-pairs)")
  );
};

# Log to console (stdout) - visible in docker logs
destination d_console {
  file("/dev/stdout"
    template("${ISODATE} ${HOST} ${PROGRAM}: ${MESSAGE}\n")
  );
};

# Log to file
destination d_file {
  file("/var/log/syslog-ng/received.log"
    template("${ISODATE} ${HOST} ${PROGRAM}: ${MESSAGE}\n")
    create_dirs(yes)
  );
};

log {
  source(s_syslog);
  destination(d_http);
  destination(d_console);
  destination(d_file);
};
